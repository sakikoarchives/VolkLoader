name: Release

"on":
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (for example v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark this release as a prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve tag and prerelease flag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ "$tag" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
          else
            tag="${{ inputs.tag }}"
            prerelease="${{ inputs.prerelease }}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    name: Publish ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            label: Windows x64
            asset_suffix: windows-x64
            archive_ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            label: Linux x64
            asset_suffix: linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            label: macOS Apple Silicon
            asset_suffix: macos-arm64
            archive_ext: tar.gz
          - os: macos-latest
            rid: osx-x64
            label: macOS Intel
            asset_suffix: macos-x64
            archive_ext: tar.gz

    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore VolkLoaderAvalonia.csproj

      - name: Publish application
        shell: bash
        run: |
          set -euo pipefail
          publish_dir="$GITHUB_WORKSPACE/publish/${{ matrix.asset_suffix }}"

          dotnet publish VolkLoaderAvalonia.csproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            --no-restore \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            --output "$publish_dir"

      - name: Package release asset (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $assetName = "VolkLoader-$env:RELEASE_TAG-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}"
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/${{ matrix.asset_suffix }}"
          $assetPath = Join-Path $env:GITHUB_WORKSPACE $assetName

          if (Test-Path $assetPath) {
            Remove-Item $assetPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $assetPath -Force

      - name: Package release asset (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          asset_name="VolkLoader-$RELEASE_TAG-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}"
          tar -C "$GITHUB_WORKSPACE/publish/${{ matrix.asset_suffix }}" -czf "$GITHUB_WORKSPACE/$asset_name" .

      - name: Upload packaged asset
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ matrix.asset_suffix }}
          path: VolkLoader-${{ env.RELEASE_TAG }}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-asset-*
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: ls -lah dist

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail

          prerelease_flag=""
          if [[ "$PRERELEASE" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            if [[ "${{ github.event_name }}" == "push" ]]; then
              gh release create "$RELEASE_TAG" dist/* --verify-tag --generate-notes $prerelease_flag
            else
              gh release create "$RELEASE_TAG" dist/* --target "$GITHUB_SHA" --generate-notes $prerelease_flag
            fi
          fi
