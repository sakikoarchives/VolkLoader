name: .NET 8 CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ./VolkLoaderAvalonia.csproj

      - name: Build
        run: dotnet build ./VolkLoaderAvalonia.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./VolkLoaderAvalonia.csproj --configuration Release --no-build --output ./artifacts/${{ runner.os }}

      - name: Upload published artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: VolkLoader-${{ runner.os }}
          path: ./artifacts/${{ runner.os }}
          if-no-files-found: error
          retention-days: 14
